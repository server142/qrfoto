version: '3.8'

services:
  database:
    image: mysql:8.2
    container_name: veltrix_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: veltrix_events
      MYSQL_USER: veltrix
      MYSQL_PASSWORD: veltrix_password
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d

  redis:
    image: redis:alpine
    container_name: veltrix_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    container_name: veltrix_minio
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: veltrix_n8n
    restart: unless-stopped
    ports:
      - '5678:5678'
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Mexico_City
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  db_data:
  redis_data:
  minio_data:
  n8n_data:
